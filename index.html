<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Una carta para mamá 🤍</title>

    <link rel="stylesheet" href="style.css">

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>


    <!-- Fondo -->
    <div id="background"></div>

    <!-- Estrellas -->
    <div id="stars"></div>

    <!-- Destellos -->
    <div id="sparkles"></div>

    <!-- Pétalos -->
    <div id="petals"></div>

    <!-- Bienvenida -->
    <section id="welcome">

        <div class="glass">

            <h1>Mamá...</h1>

            <p class="subtitle">

                Si estás leyendo esto...

                <br><br>

                Gracias por regalarme unos minutos de tu tiempo.

                <br><br>

                Lo único que quiero es que leas esta carta hasta el final.

            </p>

            <button id="continueBtn">

                Continuar 🤍

            </button>

        </div>

    </section>

    <!-- Página principal -->

    <section id="mainPage">

        <div class="photoContainer">

            <!-- Aquí irá la foto -->
            <img src="img/foto.jpg" alt="Nuestra foto">

        </div>

        <h2>Para la mejor mamá del mundo</h2>

        <p class="phrase">

            Hay personas que llegan a nuestra vida...

            <br>

            Pero tú eres la persona gracias a la cual tengo una vida.

        </p>

        <button id="letterBtn">

            Leer mi carta 💌

        </button>

    </section>

    <!-- Carta -->

    <section id="letterSection">

        <div class="letter">

            <h2>Querida mamá...</h2>

            <div id="typedText"></div>

        </div>

    </section>

    <!-- Música -->

    <audio id="music" loop>

        <source src="music/cancion.mp3" type="audio/mpeg">

    </audio>

    <script src="script.js"></script>

</body>

</html>
